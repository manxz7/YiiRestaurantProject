services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yii2_restaurant_app
    depends_on:
      - db
    environment:
      YII_DB_HOST: db
      YII_DB_PORT: 3306
      YII_DB_NAME: yii2_todo
      YII_DB_USER: yii2user
      YII_DB_PASSWORD: yii2pass
    ports:
      - "8090:80"
    volumes:
      - ./:/var/www/html

  db:
    image: mysql:8.0
    container_name: yii2_restaurant_db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: yii2_todo
      MYSQL_USER: yii2user
      MYSQL_PASSWORD: yii2pass
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: yii2_restaurant_phpmyadmin
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "8082:80"

volumes:
  db_data:
